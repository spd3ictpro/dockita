<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" fill="none">
  <title>Carpal Tunnel - Palmar View</title>
  <rect width="500" height="500" fill="#fafafa" rx="8"/>
  
  <!-- Hand outline -->
  <path d="M250 40 L250 120" stroke="#c0b8a8" stroke-width="3"/>
  <ellipse cx="150" cy="150" rx="35" ry="25" fill="#f0ece4" stroke="#c0b8a8" stroke-width="2" transform="rotate(-20 150 150)"/>
  <ellipse cx="200" cy="120" rx="30" ry="22" fill="#f0ece4" stroke="#c0b8a8" stroke-width="2"/>
  <ellipse cx="300" cy="120" rx="30" ry="22" fill="#f0ece4" stroke="#c0b8a8" stroke-width="2"/>
  <ellipse cx="350" cy="150" rx="35" ry="25" fill="#f0ece4" stroke="#c0b8a8" stroke-width="2" transform="rotate(20 350 150)"/>
  <ellipse cx="250" cy="100" rx="28" ry="35" fill="#f0ece4" stroke="#c0b8a8" stroke-width="2"/>
  
  <!-- Palm -->
  <path d="M110 160 Q100 250 120 320 Q140 380 180 410 
           Q200 430 250 440 Q300 430 320 410 
           Q360 380 380 320 Q400 250 390 160 Z" 
        fill="#f0ece4" stroke="#c0b8a8" stroke-width="2"/>
  
  <!-- Carpal tunnel area highlight -->
  <ellipse cx="250" cy="300" rx="70" ry="40" fill="#e8d5d0" stroke="#c0392b" stroke-width="2" stroke-dasharray="4,3" opacity="0.7"/>
  <text x="250" y="305" text-anchor="middle" fill="#c0392b" font-family="sans-serif" font-size="10" font-weight="bold">CARPAL</text>
  <text x="250" y="318" text-anchor="middle" fill="#c0392b" font-family="sans-serif" font-size="10" font-weight="bold">TUNNEL</text>
  
  <!-- Median nerve distribution -->
  <path d="M250 280 Q220 250 180 220" stroke="#e74c3c" stroke-width="1.5" stroke-dasharray="3,3"/>
  <path d="M250 280 Q280 250 320 220" stroke="#e74c3c" stroke-width="1.5" stroke-dasharray="3,3"/>
  <path d="M250 280 L250 260" stroke="#e74c3c" stroke-width="1.5" stroke-dasharray="3,3"/>
  
  <text x="250" y="470" text-anchor="middle" fill="#333" font-family="sans-serif" font-size="12">The median nerve passes through the carpal tunnel</text>
  <text x="250" y="485" text-anchor="middle" fill="#666" font-family="sans-serif" font-size="10">Red dashed line: sensory distribution of median nerve</text>
</svg>