<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 500" fill="none">
  <title>Carpal Tunnel Anatomy</title>
  <rect width="600" height="500" fill="#fafafa" rx="8"/>
  
  <!-- Wrist outline -->
  <path d="M100 200 Q100 100 200 80 L400 80 Q500 100 500 200 L500 400 Q500 450 400 450 L200 450 Q100 450 100 400 Z" 
        fill="#f0ece4" stroke="#c0b8a8" stroke-width="2"/>
  
  <!-- Carpal bones (floor of tunnel) -->
  <path d="M140 330 Q200 350 300 350 Q400 350 460 330" 
        fill="none" stroke="#8b7d6b" stroke-width="8" stroke-linecap="round"/>
  
  <!-- Carpal arch -->
  <path d="M140 330 Q140 380 200 390 Q260 400 300 400 Q340 400 400 390 Q460 380 460 330" 
        fill="#d9d0c0" stroke="#8b7d6b" stroke-width="2"/>
  
  <!-- Flexor retinaculum (roof) -->
  <path d="M140 330 Q200 260 300 250 Q400 260 460 330" 
        fill="none" stroke="#a09080" stroke-width="6" stroke-dasharray="8,4"/>
  
  <!-- Median nerve - highlighted -->
  <path d="M280 250 L280 340" stroke="#c0392b" stroke-width="5" stroke-linecap="round"/>
  <circle cx="280" cy="260" r="8" fill="#e74c3c" opacity="0.3"/>
  <circle cx="280" cy="340" r="8" fill="#e74c3c" opacity="0.3"/>
  
  <!-- Flexor tendons -->
  <path d="M240 250 L240 340" stroke="#7f8c8d" stroke-width="3" stroke-linecap="round"/>
  <path d="M255 250 L255 340" stroke="#7f8c8d" stroke-width="3" stroke-linecap="round"/>
  <path d="M305 250 L305 340" stroke="#7f8c8d" stroke-width="3" stroke-linecap="round"/>
  <path d="M320 250 L320 340" stroke="#7f8c8d" stroke-width="3" stroke-linecap="round"/>
  <path d="M340 250 L340 340" stroke="#7f8c8d" stroke-width="3" stroke-linecap="round"/>
  
  <!-- Compression arrow -->
  <path d="M180 210 L240 280" stroke="#c0392b" stroke-width="2" stroke-dasharray="4,3" marker-end="url(#arrowRed)"/>
  <path d="M420 210 L360 280" stroke="#c0392b" stroke-width="2" stroke-dasharray="4,3" marker-end="url(#arrowRed2)"/>
  <text x="300" y="200" text-anchor="middle" fill="#c0392b" font-family="sans-serif" font-size="11" font-weight="bold">COMPRESSION SITE</text>
  
  <!-- Labels -->
  <text x="300" y="470" text-anchor="middle" fill="#333" font-family="sans-serif" font-size="12">Cross-section of the wrist showing carpal tunnel contents</text>
  
  <defs>
    <marker id="arrowRed" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0 0 L10 5 L0 10 Z" fill="#c0392b"/>
    </marker>
    <marker id="arrowRed2" viewBox="0 0 10 10" refX="0" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M10 0 L0 5 L10 10 Z" fill="#c0392b"/>
    </marker>
  </defs>
</svg>